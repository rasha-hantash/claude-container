services:
  claude:
    build: .
    environment:
      - CLAUDE_CREDENTIALS=${CLAUDE_CREDENTIALS:-}
      - TMUX_PANE=${TMUX_PANE:-}
      - BRAIN_OS_PATH=/workspace/brain-os
      - GIT_USER_NAME=${GIT_USER_NAME:-Claude Container}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-claude@container.local}
      - TARGET_REPO=${TARGET_REPO:-}
    secrets:
      - github_token
      - gt_auth_token
    volumes:
      # Mount repos read-only — Claude clones into /scratch for writes
      - ~/workspace/personal/explorations:/workspace:ro
      # Writable scratch space for cloned repos
      - workspace-scratch:/scratch
      # Persist Claude session state between runs
      - claude-state:/root/.claude/projects
      # Share cove event files with host sidebar
      - /tmp/cove-events:/tmp/cove-events
      # Mount entrypoint so edits take effect without rebuild
      - ./entrypoint.sh:/entrypoint.sh:ro
      # Full Claude ecosystem
      - ~/.claude/hooks:/root/.claude/hooks:ro
      - ~/.claude/agents:/root/.claude/agents:ro
      - ~/.claude/skills:/root/.claude/skills:ro
      - ~/.claude/commands:/root/.claude/commands:ro
      - ~/.claude/CLAUDE.md:/root/.claude/CLAUDE.md:ro
      - ~/.claude/settings.json:/root/.claude-host/settings.json:ro
      # Cove event sharing (sidebar reads these on host)
      - ~/.local/state/cove/events:/root/.local/state/cove/events
    cap_add:
      # Required for chattr +i to lock settings.json as immutable.
      # Prevents Claude from modifying its own deny rules mid-session.
      - LINUX_IMMUTABLE
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "4"

secrets:
  github_token:
    environment: GITHUB_TOKEN
  gt_auth_token:
    environment: GT_AUTH_TOKEN

volumes:
  claude-state:
  workspace-scratch:
