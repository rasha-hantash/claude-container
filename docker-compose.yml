services:
  claude:
    build: .
    environment:
      - CLAUDE_CREDENTIALS=${CLAUDE_CREDENTIALS:-}
      - TMUX_PANE=${TMUX_PANE:-}
      - BRAIN_OS_PATH=/workspace/brain-os
      - GIT_USER_NAME=${GIT_USER_NAME:-Claude Container}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-claude@container.local}
      - TARGET_REPO=${TARGET_REPO:-}
    secrets:
      - github_token
      - gt_auth_token
    volumes:
      # Mount repos read-only — Claude clones into /scratch for writes
      - ~/workspace/personal/explorations:/workspace:ro
      # Master plan writable (overrides the :ro parent mount)
      - ~/workspace/personal/explorations/master-plan:/workspace/master-plan
      # Writable scratch space for cloned repos
      - workspace-scratch:/scratch
      # Persist Claude session state between runs
      - claude-state:/home/node/.claude/projects
      # Share cove event files with host sidebar
      - /tmp/cove-events:/tmp/cove-events
      # Mount entrypoint so edits take effect without rebuild
      - ./entrypoint.sh:/entrypoint.sh:ro
      # Full Claude ecosystem (read-only from host)
      - ~/.claude/hooks:/home/node/.claude/hooks:ro
      - ~/.claude/agents:/home/node/.claude/agents:ro
      - ~/.claude/skills:/home/node/.claude/skills:ro
      - ~/.claude/commands:/home/node/.claude/commands:ro
      - ~/.claude/CLAUDE.md:/home/node/.claude-host/CLAUDE.md:ro
      # Container-specific CLAUDE.md overrides (appended at startup by entrypoint)
      - ./claude-config/container-addendum.md:/claude-config/container-addendum.md:ro
      - ~/.claude/settings.json:/home/node/.claude-host/settings.json:ro
      # Persist Claude UI state (theme, onboarding) across container runs
      - ~/.claude.json:/home/node/.claude.json
      # Cove event sharing (sidebar reads these on host)
      - ~/.local/state/cove/events:/home/node/.local/state/cove/events
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "4"

secrets:
  github_token:
    environment: GITHUB_TOKEN
  gt_auth_token:
    environment: GT_AUTH_TOKEN

volumes:
  claude-state:
  workspace-scratch:
